name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'feature/**'
      - 'copilot/**'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: dari-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: dari-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Dari.App/Dari.App.csproj)
          FORMAT_VERSION=$(grep -oP '(?<=FormatVersion = )\d+' Dari.Archiver/Format/DariConstants.cs)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Release tag: strip the leading "v"
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Branch pre-release: <csproj-version>-<branch-slug>.<short-sha>
            BRANCH="${GITHUB_REF#refs/heads/}"
            BRANCH_SLUG="${BRANCH//\//-}"
            SHORT_SHA="${GITHUB_SHA:0:8}"
            VERSION="${BASE_VERSION}-${BRANCH_SLUG}.${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "informational_version=${VERSION}+${FORMAT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$( [[ "$GITHUB_REF" == refs/tags/* ]] && echo false || echo true )" >> "$GITHUB_OUTPUT"

      - name: Publish self-contained
        run: >
          dotnet publish Dari.App/Dari.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -p:InformationalVersion=${{ steps.version.outputs.informational_version }}
          -o publish/${{ matrix.artifact }}

      - name: Archive artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          cd publish
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Archive artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.artifact }}/* -DestinationPath publish/${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            publish/${{ matrix.artifact }}.tar.gz
            publish/${{ matrix.artifact }}.zip

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Dari.App/Dari.App.csproj)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            BRANCH_SLUG="${BRANCH//\//-}"
            SHORT_SHA="${GITHUB_SHA:0:8}"
            VERSION="${BASE_VERSION}-${BRANCH_SLUG}.${SHORT_SHA}"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Dari ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
